<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DDAS - Register</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script id="tailwind-config">
  tailwind.config = {
    darkMode: "class",
    theme: {
      extend: {
        colors: {
          "primary": "#006875",
          "primary-container": "#00e5ff",
          "primary-fixed-dim": "#00daf3",
          "on-primary": "#ffffff",
          "on-primary-container": "#00626e",
          "background": "var(--background)",
          "on-background": "var(--on-background)",
          "surface": "var(--surface)",
          "on-surface": "var(--on-surface)",
          "surface-container-lowest": "var(--surface-container-lowest)",
          "surface-container-low": "var(--surface-container-low)",
          "surface-container": "var(--surface-container)",
          "on-surface-variant": "var(--on-surface-variant)",
          "outline": "#6b7a7d",
          "outline-variant": "#bac9cc",
        },
        fontFamily: {
          "headline": ["Manrope"],
          "body": ["Inter"],
          "label": ["Inter"]
        }
      }
    }
  }
</script>
<style>
  :root {
    --background: #f8f9ff;
    --surface-container-lowest: #ffffff;
    --surface-container: #eaeef9;
    --surface-container-low: #eff3fe;
    --surface: #f8f9ff;
    --on-surface: #171c23;
    --on-surface-variant: #3b494c;
    --on-background: #171c23;
  }
  .material-symbols-outlined {
    font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    display: inline-block; vertical-align: middle;
  }
  .bg-grid-pattern {
    background-size: 40px 40px;
    background-image:
      linear-gradient(to right, rgba(0,104,117,0.05) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(0,104,117,0.05) 1px, transparent 1px);
  }
</style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">

<!-- Background Decor -->
<div class="absolute inset-0 bg-grid-pattern pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-surface-container/20 rounded-full blur-[120px] pointer-events-none"></div>

<!-- Main Content -->
<main class="relative z-10 w-full max-w-[480px] px-6">

  <!-- Header -->
  <div class="flex flex-col items-center mb-10">
    <div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-6 shadow-lg shadow-primary-container/20 border border-white/20">
      <span class="material-symbols-outlined text-on-primary-container text-4xl" style="font-variation-settings:'FILL' 1;">person_add</span>
    </div>
    <h1 class="font-headline text-3xl font-extrabold text-on-background tracking-tight mb-2">Create Account</h1>
    <p class="text-on-surface-variant font-medium text-center max-w-[280px]">Register to access the DDAS Management Console.</p>
  </div>

  <!-- Register Card -->
  <div class="bg-surface-container-lowest rounded-full p-10 shadow-[0_20px_50px_rgba(23,28,35,0.06)] border border-outline-variant/10">
    <form class="space-y-6" onsubmit="return false;">

      <!-- Email -->
      <div class="space-y-2">
        <label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="reg-email">Institutional Email</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary">mail</span>
          </div>
          <input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-4 text-on-surface font-body text-sm transition-all placeholder:text-outline/50"
            id="reg-email" placeholder="name@institute.edu" type="email"/>
        </div>
      </div>

      <!-- Password -->
      <div class="space-y-2">
        <label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="reg-password">Create Password</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary">lock</span>
          </div>
          <input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-10 text-on-surface font-body text-sm transition-all placeholder:text-outline/50"
            id="reg-password" placeholder="Min. 6 characters" type="password"/>
          <button type="button" onclick="togglePassword('reg-password', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-xl">visibility_off</span>
          </button>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="space-y-2">
        <label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="reg-confirm">Confirm Password</label>
        <div class="relative group">
          <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
            <span class="material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary">lock_reset</span>
          </div>
          <input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-10 text-on-surface font-body text-sm transition-all placeholder:text-outline/50"
            id="reg-confirm" placeholder="Re-enter password" type="password"/>
          <button type="button" onclick="togglePassword('reg-confirm', this)" class="absolute inset-y-0 right-0 pr-4 flex items-center text-outline hover:text-primary transition-colors">
            <span class="material-symbols-outlined text-xl">visibility_off</span>
          </button>
        </div>
      </div>

      <!-- Message -->
      <div id="regMessage" class="hidden text-xs font-semibold px-3 py-2 rounded-lg transition-all"></div>

      <!-- Submit -->
      <button id="registerBtn"
        class="w-full bg-gradient-to-r from-primary to-primary-container text-on-primary font-headline font-bold py-4 px-6 rounded-lg shadow-lg shadow-primary/20 hover:shadow-xl hover:shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-3"
        type="button" onclick="registerUser()">
        Create Account
        <span class="material-symbols-outlined text-xl">arrow_forward</span>
      </button>

    </form>

    <!-- Back to Login -->
    <div class="mt-8 text-center">
      <p class="text-xs text-on-surface-variant">
        Already have an account?
        <a class="text-primary font-bold hover:underline" href="Index.html">Sign in</a>
      </p>
    </div>
  </div>
</main>

<script>
function togglePassword(inputId, btn) {
    const input = document.getElementById(inputId);
    const icon  = btn.querySelector('.material-symbols-outlined');
    if (input.type === 'password') {
        input.type = 'text';
        icon.textContent = 'visibility';
    } else {
        input.type = 'password';
        icon.textContent = 'visibility_off';
    }
}

async function registerUser() {
    const email    = document.getElementById('reg-email').value.trim();
    const password = document.getElementById('reg-password').value;
    const confirm  = document.getElementById('reg-confirm').value;
    const msgEl    = document.getElementById('regMessage');
    const btn      = document.getElementById('registerBtn');

    // Client-side validation
    if (!email || !email.includes('@')) {
        showMsg('Please enter a valid email address.', 'error'); return;
    }
    if (password.length < 6) {
        showMsg('Password must be at least 6 characters.', 'error'); return;
    }
    if (password !== confirm) {
        showMsg('Passwords do not match.', 'error'); return;
    }

    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
        const formData = new FormData();
        formData.append('email', email);
        formData.append('password', password);

        const response = await fetch('http://localhost:8080/api/auth/register', {
            method: 'POST',
            body: formData
        });

        const data = await response.json();

        if (data.status === 'success') {
            showMsg(data.message + ' Redirecting to login...', 'success');
            setTimeout(() => window.location.href = 'Index.html', 2000);
        } else {
            showMsg(data.message || 'Registration failed.', 'error');
            btn.disabled = false;
            btn.innerHTML = 'Create Account <span class="material-symbols-outlined text-xl">arrow_forward</span>';
        }
    } catch (error) {
        showMsg('Cannot reach server. Is the backend running?', 'error');
        btn.disabled = false;
        btn.innerHTML = 'Create Account <span class="material-symbols-outlined text-xl">arrow_forward</span>';
        console.error('Register error:', error);
    }
}

function showMsg(message, type) {
    const el = document.getElementById('regMessage');
    el.textContent = message;
    el.className = type === 'success'
        ? 'text-xs font-semibold px-3 py-2 rounded-lg bg-emerald-50 text-emerald-700 border border-emerald-200'
        : 'text-xs font-semibold px-3 py-2 rounded-lg bg-red-50 text-red-700 border border-red-200';
    el.classList.remove('hidden');
}
</script>
</body></html>
