<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>DDAS – Sign In</title>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet"/>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{min-height:100vh;display:flex;font-family:'Inter',sans-serif;background:#fff;overflow:hidden;}

/* ── Two panels ── */
.left{flex:1;background:#fff;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
.left::before{content:'';position:absolute;inset:0;background-image:linear-gradient(rgba(124,58,237,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(124,58,237,.04) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;}
.right{width:460px;min-height:100vh;background:linear-gradient(160deg,#f5f0ff,#ede9fe 60%,#faf5ff);display:flex;align-items:center;justify-content:center;padding:40px 48px;overflow-y:auto;}

/* ── Top-right logo ── */
.top-logo{position:fixed;top:20px;left:20px;display:flex;align-items:center;gap:9px;z-index:100;background:rgba(255,255,255,.85);backdrop-filter:blur(12px);border:1px solid #e9d5ff;border-radius:50px;padding:7px 16px 7px 10px;}
.top-logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border-radius:8px;display:flex;align-items:center;justify-content:center;}
.top-logo-icon svg{width:16px;height:16px;}
.top-logo-text{font-family:'Manrope',sans-serif;font-weight:800;font-size:15px;color:#3b0764;letter-spacing:-.3px;}

/* ══ CHARACTER STAGE ══ */
.stage{position:relative;width:480px;height:380px;flex-shrink:0;}

/* Purple tall – BEHIND orange (z:1), tallest character */
#cP{position:absolute;bottom:0;left:100px;width:120px;height:310px;background:#7c3aed;border-radius:18px 18px 6px 6px;z-index:1;}
/* Orange semicircle – IN FRONT of purple (z:2), short dome */
#cO{position:absolute;bottom:0;left:0;width:280px;height:160px;background:#f97316;border-radius:140px 140px 0 0;z-index:2;}
/* Dark rect – beside purple, in front (z:3) */
#cD{position:absolute;bottom:0;left:215px;width:100px;height:230px;background:#1e1b2e;border-radius:12px 12px 5px 5px;z-index:3;}
/* Yellow capsule – touching dark (z:4) */
#cY{position:absolute;bottom:0;left:312px;width:82px;height:190px;background:#eab308;border-radius:44px 44px 10px 10px;z-index:4;}

/* ── Eye containers ── */
.eyes{position:absolute;left:50%;transform:translateX(-50%);display:flex;}
#eO{bottom:30%;gap:10px;}
#eP{top:26%;gap:10px;}
#eD{top:30%;gap:12px;}
#eY{top:34%;gap:8px;}

/* Large (dark char) – big expressive white eyes */
.el{width:26px;height:26px;background:#fff;border-radius:50%;position:relative;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,.25);}
.el .p{width:14px;height:14px;background:#111;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .08s linear;}
.el .p::after{content:'';width:4px;height:4px;background:#fff;border-radius:50%;position:absolute;top:2px;left:2px;}
/* Medium (purple) */
.em{width:18px;height:18px;background:#fff;border-radius:50%;position:relative;overflow:hidden;}
.em .p{width:10px;height:10px;background:#111;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .08s linear;}
.em .p::after{content:'';width:3px;height:3px;background:#fff;border-radius:50%;position:absolute;top:1px;left:1px;}
/* Small (orange, yellow) – white eyes with movable dark pupils */
.es{width:12px;height:12px;background:#fff;border-radius:50%;position:relative;overflow:hidden;}
.es .p{width:7px;height:7px;background:#111;border-radius:50%;position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);transition:transform .08s linear;}

/* ── Mouths ── */
.mouth{position:absolute;left:50%;transform:translateX(-50%);}
#mO{bottom:15%;width:20px;height:3.5px;background:#6b2a00;border-radius:2px;}
#mP{bottom:18%;width:24px;height:3.5px;background:#fff;border-radius:2px;opacity:.8;}
#mD{bottom:18%;width:22px;height:3.5px;background:#fff;border-radius:2px;opacity:.7;}
#mY{bottom:20%;width:16px;height:3px;background:#6b5200;border-radius:2px;}

/* ── Animations ── */
@keyframes happyBounce{0%,100%{transform:translateY(0);}30%{transform:translateY(-20px);}60%{transform:translateY(-8px);}80%{transform:translateY(-3px);}}
@keyframes sadDroop{to{transform:translateY(10px);}}
@keyframes peekUp{0%,100%{transform:translateY(0);}50%{transform:translateY(-12px);}}
.a-happy{animation:happyBounce .7s ease 2;}
.a-sad{animation:sadDroop .5s ease forwards;}
.a-peek{animation:peekUp .5s ease forwards;}

/* ══ LOGIN CARD ══ */
.card{width:100%;max-width:380px;}
.logo-row{display:flex;align-items:center;gap:12px;margin-bottom:30px;}
.logo-icon{width:48px;height:48px;background:linear-gradient(135deg,#7c3aed,#a78bfa);border-radius:14px;display:flex;align-items:center;justify-content:center;box-shadow:0 8px 24px rgba(124,58,237,.3);}
.logo-text{font-family:'Manrope',sans-serif;font-size:26px;font-weight:800;color:#3b0764;}
.logo-sub{font-size:10px;font-weight:700;color:#a78bfa;letter-spacing:.07em;text-transform:uppercase;}
.form-title{font-family:'Manrope',sans-serif;font-size:22px;font-weight:800;color:#1e1b4b;margin-bottom:4px;}
.form-sub{font-size:13px;color:#6b7280;margin-bottom:28px;}

.field{margin-bottom:18px;}
.field label{display:block;font-size:11px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#7c3aed;margin-bottom:7px;}
.field-row{position:relative;}
.fi{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:#a78bfa;pointer-events:none;}
.field input{width:100%;background:#fff;border:2px solid #e9d5ff;border-radius:12px;padding:13px 14px 13px 42px;font-size:14px;color:#1e1b4b;font-family:'Inter',sans-serif;outline:none;transition:all .25s;}
.field input:focus{border-color:#7c3aed;box-shadow:0 0 0 4px rgba(124,58,237,.12);}
.field input::placeholder{color:#c4b5fd;}
.pw-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:#a78bfa;font-size:16px;padding:4px;}
.pw-btn:hover{color:#7c3aed;}
.field-meta{display:flex;justify-content:space-between;align-items:center;margin-bottom:7px;}
.field-meta label{margin-bottom:0;}
.forgot{font-size:11px;font-weight:700;color:#7c3aed;text-decoration:none;}
.forgot:hover{color:#5b21b6;}
.rem{display:flex;align-items:center;gap:8px;margin-bottom:22px;}
.rem input{accent-color:#7c3aed;width:15px;height:15px;cursor:pointer;}
.rem label{font-size:12px;color:#6b7280;cursor:pointer;}
.btn{width:100%;padding:15px;background:linear-gradient(90deg,#7c3aed,#a855f7);border:none;border-radius:12px;color:#fff;font-family:'Manrope',sans-serif;font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:hover{transform:translateY(-2px);box-shadow:0 12px 32px rgba(124,58,237,.4);}
.btn:active{transform:scale(.98);}
.btn:disabled{opacity:.7;cursor:not-allowed;transform:none;}
.msg{font-size:12px;font-weight:600;margin-top:12px;padding:10px 14px;border-radius:10px;display:none;}
.err{background:#fef2f2;border:1.5px solid #fecaca;color:#dc2626;}
.ok{background:#f0fdf4;border:1.5px solid #bbf7d0;color:#16a34a;}
.foot{margin-top:22px;text-align:center;font-size:12px;color:#9ca3af;}
.foot a{color:#7c3aed;font-weight:700;text-decoration:none;}

.status{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:7px;background:rgba(124,58,237,.07);border:1px solid rgba(124,58,237,.15);border-radius:999px;padding:6px 18px;font-size:10px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#7c3aed;white-space:nowrap;}
.sdot{width:7px;height:7px;background:#22c55e;border-radius:50%;animation:blink 2s ease-in-out infinite;}
@keyframes blink{0%,100%{opacity:1;}50%{opacity:.3;}}
</style>
</head>
<body>

<!-- Top-right DDAS logo -->
<div class="top-logo">
  <div class="top-logo-icon">
    <svg viewBox="0 0 16 16" fill="none"><rect x="1" y="11" width="14" height="3" rx="1.5" fill="white" opacity=".4"/><rect x="1" y="6.5" width="14" height="3" rx="1.5" fill="white" opacity=".7"/><rect x="1" y="2" width="14" height="3" rx="1.5" fill="white"/></svg>
  </div>
  <span class="top-logo-text">DDAS</span>
</div>

<!-- LEFT PANEL -->
<div class="left">
  <div class="stage" id="stage">

    <!-- Orange dome (bottom-left, z=1) -->
    <div id="cO">
      <div class="eyes" id="eO">
        <div class="es"><div class="p" id="pOL"></div></div>
        <div class="es"><div class="p" id="pOR"></div></div>
      </div>
      <div class="mouth" id="mO"></div>
    </div>

    <!-- Purple tall (z=2) -->
    <div id="cP">
      <div class="eyes" id="eP">
        <div class="em"><div class="p" id="pPL"></div></div>
        <div class="em"><div class="p" id="pPR"></div></div>
      </div>
      <div class="mouth" id="mP"></div>
    </div>

    <!-- Dark rect (z=3) -->
    <div id="cD">
      <div class="eyes" id="eD">
        <div class="el"><div class="p" id="pDL"></div></div>
        <div class="el"><div class="p" id="pDR"></div></div>
      </div>
      <div class="mouth" id="mD"></div>
    </div>

    <!-- Yellow capsule (z=4) -->
    <div id="cY">
      <div class="eyes" id="eY">
        <div class="es"><div class="p" id="pYL"></div></div>
        <div class="es"><div class="p" id="pYR"></div></div>
      </div>
      <div class="mouth" id="mY"></div>
    </div>

  </div>
</div>

<!-- RIGHT PANEL -->
<div class="right">
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 26 26" fill="none"><rect x="2" y="18" width="22" height="5" rx="2.5" fill="white" opacity=".4"/><rect x="2" y="10" width="22" height="5" rx="2.5" fill="white" opacity=".7"/><rect x="2" y="2" width="22" height="5" rx="2.5" fill="white"/></svg>
      </div>
      <div>
        <div class="logo-text">DDAS</div>
        <div class="logo-sub">Data Duplication Alert System</div>
      </div>
    </div>
    <div class="form-title">Welcome back 👋</div>
    <div class="form-sub">Sign in to access the management console.</div>

    <div class="field">
      <label for="email">Institutional Email</label>
      <div class="field-row">
        <svg class="fi" viewBox="0 0 20 20" fill="currentColor"><path d="M2.003 5.884L10 9.882l7.997-3.998A2 2 0 0016 4H4a2 2 0 00-1.997 1.884z"/><path d="M18 8.118l-8 4-8-4V14a2 2 0 002 2h12a2 2 0 002-2V8.118z"/></svg>
        <input type="email" id="email" placeholder="name@institute.edu" autocomplete="username"/>
      </div>
    </div>

    <div class="field">
      <div class="field-meta">
        <label for="password">Security Key</label>
        <a href="ResetPassword.html" class="forgot">Forgot Key?</a>
      </div>
      <div class="field-row">
        <svg class="fi" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/></svg>
        <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password"/>
        <button type="button" class="pw-btn" id="pwBtn" onclick="togglePw()">👁</button>
      </div>
    </div>

    <div class="rem">
      <input type="checkbox" id="remember"/>
      <label for="remember">Remember this workstation</label>
    </div>

    <button class="btn" id="loginBtn" type="button" onclick="doLogin()">
      Sign In to Console
      <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>
    </button>

    <div class="msg err" id="errMsg"></div>
    <div class="msg ok"  id="okMsg"></div>
    <div class="foot">New here? <a href="Register.html">Request access</a></div>
  </div>
</div>

<div class="status"><div class="sdot"></div>Systems Operational</div>

<script>
/* ══ EYE TRACKING ══ */
const PAIRS = [
  {l:'pOL',r:'pOR',max:3},
  {l:'pPL',r:'pPR',max:4},
  {l:'pDL',r:'pDR',max:5},
  {l:'pYL',r:'pYR',max:3}
];

function movePair(lId, rId, maxT, tx, ty){
  [lId,rId].forEach(id=>{
    const p=document.getElementById(id);
    if(!p)return;
    const eye=p.parentElement;
    const r=eye.getBoundingClientRect();
    const cx=r.left+r.width/2, cy=r.top+r.height/2;
    const dx=tx-cx, dy=ty-cy;
    const d=Math.sqrt(dx*dx+dy*dy)||1;
    const t=Math.min(d*.15,maxT);
    p.style.transform=`translate(calc(-50% + ${dx/d*t}px),calc(-50% + ${dy/d*t}px))`;
  });
}
function moveAll(tx,ty){PAIRS.forEach(({l,r,max})=>movePair(l,r,max,tx,ty));}
function centerAll(){document.querySelectorAll('.p').forEach(p=>{p.style.display='';p.style.transform='translate(-50%,-50%)';});}
function lookLeft(){
  document.querySelectorAll('.p').forEach(p=>{p.style.display='';p.style.transform='translate(calc(-50% - 4px),calc(-50% + 2px))';});
}
function lookAt(el){
  const r=el.getBoundingClientRect();
  const tx=r.left+r.width/2, ty=r.top+r.height/2;
  PAIRS.forEach(({l,r2,max})=>movePair(l,r2||l.replace('L','R'),max,tx,ty));
}

let state='idle';
document.addEventListener('mousemove',e=>{if(state==='idle')moveAll(e.clientX,e.clientY);});

/* mouths */
function resetMouths(){
  ['mO','mP','mD','mY'].forEach(id=>{
    const m=document.getElementById(id);
    m.style.cssText='position:absolute;left:50%;transform:translateX(-50%);';
    if(id==='mO'){m.style.bottom='15%';m.style.width='20px';m.style.height='3.5px';m.style.background='#6b2a00';m.style.borderRadius='2px';}
    else if(id==='mP'){m.style.bottom='18%';m.style.width='24px';m.style.height='3.5px';m.style.background='#fff';m.style.borderRadius='2px';m.style.opacity='.8';}
    else if(id==='mD'){m.style.bottom='18%';m.style.width='22px';m.style.height='3.5px';m.style.background='#fff';m.style.borderRadius='2px';m.style.opacity='.7';}
    else{m.style.bottom='20%';m.style.width='16px';m.style.height='3px';m.style.background='#6b5200';m.style.borderRadius='2px';}
  });
}
function setMouths(type){
  ['mO','mP','mD','mY'].forEach(id=>{
    const m=document.getElementById(id);
    m.style.cssText='position:absolute;left:50%;transform:translateX(-50%);';
    const isLight=(id==='mO'||id==='mY');
    const col=isLight?'#3b1500':'#fff';
    if(type==='happy'){
      m.style.bottom='18%';m.style.width='22px';m.style.height='11px';
      m.style.border=`3px solid ${col}`;m.style.borderTop='none';
      m.style.borderRadius='0 0 999px 999px';m.style.background='transparent';
    } else if(type==='sad') {
      m.style.bottom='18%';m.style.width='22px';m.style.height='11px';
      m.style.border=`3px solid ${col}`;m.style.borderBottom='none';
      m.style.borderRadius='999px 999px 0 0';m.style.background='transparent';
      m.style.marginTop='6px';
    } else if(type==='shy') {
      /* wavy nervous line for password state */
      m.style.bottom='18%';m.style.width='20px';m.style.height='5px';
      m.style.background='transparent';
      m.style.border='none';
      m.style.borderBottom=`3px solid ${col}`;
      m.style.borderRadius='0 50% 0 50%';
    }
  });
}

function animChars(cls){
  ['cO','cP','cD','cY'].forEach(id=>{
    const el=document.getElementById(id);
    el.classList.remove('a-happy','a-sad','a-peek');
    void el.offsetWidth;
    if(cls)el.classList.add(cls);
  });
}

/* input handlers */
const emailEl=document.getElementById('email');
const passEl=document.getElementById('password');

emailEl.addEventListener('focus',()=>{
  if(state==='happy'||state==='sad')return;
  state='email'; animChars('a-peek'); resetMouths();
  const r=emailEl.getBoundingClientRect();
  moveAll(r.left+r.width/2, r.top+r.height/2);
});
emailEl.addEventListener('input',()=>{
  if(state==='email'){const r=emailEl.getBoundingClientRect();moveAll(r.left+r.width/2,r.top+r.height/2);}
});
emailEl.addEventListener('blur',()=>{if(state==='email'){state='idle';animChars('');resetMouths();}});

passEl.addEventListener('focus',()=>{
  if(state==='happy'||state==='sad')return;
  state='password'; animChars(''); setMouths('shy'); lookLeft();
});
passEl.addEventListener('blur',()=>{if(state==='password'){state='idle';centerAll();resetMouths();}});

resetMouths();

/* ══ PASSWORD TOGGLE ══ */
function togglePw(){
  const i=document.getElementById('password'),b=document.getElementById('pwBtn');
  i.type=i.type==='password'?'text':'password';
  b.textContent=i.type==='password'?'👁':'🙈';
}

/* ══ LOGIN ══ */
async function doLogin(){
  const email=document.getElementById('email').value.trim();
  const pass=document.getElementById('password').value;
  const err=document.getElementById('errMsg'),ok=document.getElementById('okMsg');
  err.style.display='none'; ok.style.display='none';

  if(!email||!email.includes('@')){
    err.textContent='Please enter a valid institutional email.';
    err.style.display='block';
    state='sad';animChars('a-sad');setMouths('sad');
    setTimeout(()=>{state='idle';animChars('');resetMouths();centerAll();},3000);return;
  }
  if(!pass){
    err.textContent='Please enter your security key.';
    err.style.display='block';
    state='sad';animChars('a-sad');setMouths('sad');
    setTimeout(()=>{state='idle';animChars('');resetMouths();centerAll();},3000);return;
  }

  const btn=document.getElementById('loginBtn');
  btn.textContent='Signing in…';btn.disabled=true;
  try{
    const fd=new FormData();fd.append('email',email);fd.append('password',pass);
    const res=await fetch('http://localhost:8080/api/auth/login',{method:'POST',body:fd});
    const data=await res.json();
    if(data.status==='success'){
      sessionStorage.setItem('ddas_logged_in','true');
      sessionStorage.setItem('ddas_user_email',data.email||email);
      state='happy';animChars('a-happy');setMouths('happy');
      ok.textContent='Login successful! Redirecting…';ok.style.display='block';
      setTimeout(()=>window.location.href='Dashboard.html',1200);
    } else {
      state='sad';animChars('a-sad');setMouths('sad');
      err.textContent='Invalid email or security key.';err.style.display='block';
      setTimeout(()=>{state='idle';animChars('');resetMouths();centerAll();},3000);
    }
  }catch(e){
    state='sad';animChars('a-sad');setMouths('sad');
    err.textContent='Cannot reach server. Is the backend running?';err.style.display='block';
    setTimeout(()=>{state='idle';animChars('');resetMouths();centerAll();},3000);
    console.error(e);
  }finally{
    btn.innerHTML='Sign In to Console <svg width="18" height="18" viewBox="0 0 20 20" fill="currentColor"><path fill-rule="evenodd" d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z" clip-rule="evenodd"/></svg>';
    btn.disabled=false;
  }
}
document.addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
</script>
</body>
</html>
