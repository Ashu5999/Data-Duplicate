<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>DDAS Console - Sign In</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "outline": "#6b7a7d",
                    "primary": "#006875",
                    "on-error-container": "#93000a",
                    "background": "#f8f9ff",
                    "secondary-container": "#d0d9ff",
                    "on-tertiary-container": "#4f5878",
                    "surface-tint": "#006875",
                    "on-primary-fixed": "#001f24",
                    "on-background": "#171c23",
                    "surface-variant": "#dee2ed",
                    "on-surface": "#171c23",
                    "on-surface-variant": "#3b494c",
                    "on-primary-fixed-variant": "#004f58",
                    "primary-container": "#00e5ff",
                    "surface-container-lowest": "#ffffff",
                    "on-error": "#ffffff",
                    "tertiary": "#545d7d",
                    "inverse-surface": "#2c3139",
                    "surface-container": "#eaeef9",
                    "on-primary": "#ffffff",
                    "tertiary-fixed-dim": "#bdc5ea",
                    "secondary": "#545d7d",
                    "error": "#ba1a1a",
                    "on-secondary": "#ffffff",
                    "surface": "#f8f9ff",
                    "secondary-fixed-dim": "#bdc5ea",
                    "inverse-primary": "#00daf3",
                    "error-container": "#ffdad6",
                    "on-tertiary-fixed-variant": "#3d4665",
                    "outline-variant": "#bac9cc",
                    "surface-container-highest": "#dee2ed",
                    "inverse-on-surface": "#edf1fc",
                    "on-secondary-container": "#555e7e",
                    "on-primary-container": "#00626e",
                    "primary-fixed": "#9cf0ff",
                    "secondary-fixed": "#dbe1ff",
                    "surface-container-low": "#eff3fe",
                    "surface-dim": "#d6dae5",
                    "surface-bright": "#f8f9ff",
                    "on-secondary-fixed": "#111a37",
                    "surface-container-high": "#e4e8f3",
                    "tertiary-container": "#c6cff5",
                    "on-tertiary": "#ffffff",
                    "primary-fixed-dim": "#00daf3",
                    "on-secondary-fixed-variant": "#3d4665",
                    "tertiary-fixed": "#dbe1ff",
                    "on-tertiary-fixed": "#111a37"
            },
            "borderRadius": {
                    "DEFAULT": "0.125rem",
                    "lg": "0.25rem",
                    "xl": "0.5rem",
                    "full": "0.75rem"
            },
            "fontFamily": {
                    "headline": ["Manrope"],
                    "body": ["Inter"],
                    "label": ["Inter"]
            }
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            display: inline-block;
            vertical-align: middle;
        }
        .bg-grid-pattern {
            background-size: 40px 40px;
            background-image: 
                linear-gradient(to right, rgba(0, 104, 117, 0.05) 1px, transparent 1px),
                linear-gradient(to bottom, rgba(0, 104, 117, 0.05) 1px, transparent 1px);
        }
        .glass-effect {
            backdrop-filter: blur(24px);
            background: rgba(255, 255, 255, 0.8);
        }
    </style>
</head>
<body class="bg-background font-body text-on-surface min-h-screen flex items-center justify-center relative overflow-hidden">
<!-- Background Decor -->
<div class="absolute inset-0 bg-grid-pattern pointer-events-none"></div>
<div class="absolute top-[-10%] right-[-10%] w-[500px] h-[500px] bg-primary-container/10 rounded-full blur-[120px] pointer-events-none"></div>
<div class="absolute bottom-[-10%] left-[-10%] w-[500px] h-[500px] bg-secondary-container/20 rounded-full blur-[120px] pointer-events-none"></div>
<!-- Main Content Wrapper -->
<main class="relative z-10 w-full max-w-[480px] px-6">
<!-- Header/Logo Area -->
<div class="flex flex-col items-center mb-10">
<div class="w-16 h-16 bg-primary-container rounded-xl flex items-center justify-center mb-6 shadow-lg shadow-primary-container/20 border border-white/20">
<span class="material-symbols-outlined text-on-primary-container text-4xl" data-icon="waves" style="font-variation-settings: 'FILL' 1;">waves</span>
</div>
<h1 class="font-headline text-3xl font-extrabold text-on-background tracking-tight mb-2">
                DDAS Enterprise
            </h1>
<p class="text-on-surface-variant font-medium text-center max-w-[280px]">
                Preventing duplicate downloads across your institute.
            </p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-full p-10 shadow-[0_20px_50px_rgba(23,28,35,0.06)] border border-outline-variant/10">
<form class="space-y-6">
<!-- Email Input -->
<div class="space-y-2">
<label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant px-1" for="email">
                        Institutional Email
                    </label>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary" data-icon="mail">mail</span>
</div>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-4 text-on-surface font-body text-sm transition-all placeholder:text-outline/50" id="email" placeholder="name@institute.edu" type="email"/>
</div>
</div>
<!-- Password Input -->
<div class="space-y-2">
<div class="flex justify-between items-center px-1">
<label class="block font-label text-[11px] font-bold uppercase tracking-wider text-on-surface-variant" for="password">
                            Security Key
                        </label>
<a class="text-[11px] font-bold uppercase tracking-wider text-primary hover:text-primary-fixed-dim transition-colors" href="#">
                            Forgot Key?
                        </a>
</div>
<div class="relative group">
<div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-xl transition-colors group-focus-within:text-primary" data-icon="lock">lock</span>
</div>
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-lg py-4 pl-12 pr-4 text-on-surface font-body text-sm transition-all placeholder:text-outline/50" id="password" placeholder="••••••••••••" type="password"/>
</div>
</div>
<!-- Options -->
<div class="flex items-center space-x-2 px-1">
<input class="w-4 h-4 rounded-lg border-outline-variant text-primary focus:ring-primary transition-all cursor-pointer" id="remember" type="checkbox"/>
<label class="text-xs font-medium text-on-surface-variant cursor-pointer select-none" for="remember">
                        Remember this workstation
                    </label>
</div>
<!-- Action Button -->
<button 
  class="w-full bg-gradient-to-r 
  from-primary to-primary-container 
  text-on-primary font-headline font-bold 
  py-4 px-6 rounded-lg shadow-lg 
  shadow-primary/20 hover:shadow-xl 
  hover:shadow-primary/30 
  active:scale-[0.98] transition-all 
  flex items-center justify-center gap-3"
  type="button"
  onclick="validateLogin()">
    Sign In to Console
    <span class="material-symbols-outlined 
    text-xl">arrow_forward</span>
</button>
<!-- Error Messages -->
<div id="emailError" class="text-red-600 text-xs font-semibold mt-2 hidden">Please enter a valid email</div>
<div id="passwordError" class="text-red-600 text-xs font-semibold mt-2 hidden">Please enter your security key</div>
</form>
<!-- Footer Link -->
<div class="mt-8 text-center">
<p class="text-xs text-on-surface-variant">
                    New initiative at your department? 
                    <a class="text-primary font-bold hover:underline" href="Register.html">Request access</a>
</p>
</div>
</div>
<!-- System Status/Metadata -->
<div class="mt-12 flex flex-col items-center gap-4">
<div class="flex items-center gap-2 bg-surface-container py-2 px-4 rounded-full border border-outline-variant/10">
<span class="w-2 h-2 bg-emerald-500 rounded-full animate-pulse"></span>
<span class="text-[10px] font-bold uppercase tracking-widest text-on-surface-variant">Systems Operational: Platform v2.4</span>
</div>
<div class="flex gap-6 text-[11px] font-medium text-outline">
<a class="hover:text-on-surface transition-colors" href="#">Privacy Protocol</a>
<a class="hover:text-on-surface transition-colors" href="#">Data Compliance</a>
<a class="hover:text-on-surface transition-colors" href="#">Enterprise Support</a>
</div>
</div>
</main>
<!-- Decorative Image Layer (Ambient) -->
<script>
function validateLogin() {
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const emailError = document.getElementById('emailError');
    const passwordError = document.getElementById('passwordError');
    
    let isValid = true;
    
    // Validate email
    if (!email || !email.includes('@')) {
        emailError.classList.remove('hidden');
        isValid = false;
    } else {
        emailError.classList.add('hidden');
    }
    
    // Validate password
    if (!password || password.trim() === '') {
        passwordError.classList.remove('hidden');
        isValid = false;
    } else {
        passwordError.classList.add('hidden');
    }
    
    // If valid, redirect to Dashboard
    if (isValid) {
        window.location.href = 'Dashboard.html';
    }
}
</script>
</body></html>
