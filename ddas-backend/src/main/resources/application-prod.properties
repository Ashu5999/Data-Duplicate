# ================================================================
# application-prod.properties  —  DDAS Production Configuration
# ================================================================
# Activated when SPRING_PROFILES_ACTIVE=prod is set (on Render)
# Uses PostgreSQL instead of H2 for persistent data storage.
# ================================================================

# ── Server ───────────────────────────────────────────────────────
# Render injects the PORT environment variable
server.port=${PORT:8080}

# ── PostgreSQL Database (provided by Render) ─────────────────────
# These values come from environment variables set in Render dashboard
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 Web Console (disabled in production) ──────────────────────
spring.h2.console.enabled=false

# ── File Upload Limits ───────────────────────────────────────────
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Application Identity ─────────────────────────────────────────
spring.application.name=ddas-backend
