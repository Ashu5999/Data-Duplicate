# ================================================================
# application-prod.properties  —  DDAS Production Configuration
# ================================================================
# Activated when SPRING_PROFILES_ACTIVE=prod is set (e.g. on Render)
# Inherits everything from application.properties, overrides below.
# ================================================================

# ── Server ───────────────────────────────────────────────────────
# Use the PORT environment variable provided by Render (default 8080)
server.port=${PORT:8080}

# ── H2 Database (File-based, persistent on Render disk) ──────────
# Render provides /opt/render/project/src as the working directory
spring.datasource.url=jdbc:h2:file:./data/ddas_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:5999}

# ── JPA / Hibernate ──────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# ── H2 Web Console (disabled in production for security) ─────────
spring.h2.console.enabled=false

# ── File Upload Limits ───────────────────────────────────────────
# Allow larger file uploads (default is 1MB)
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# ── Application Identity ─────────────────────────────────────────
spring.application.name=ddas-backend
