# ================================================================
# application.properties  —  DDAS Backend Configuration
# ================================================================
# This file configures Spring Boot behaviour at runtime.
# All values here are loaded when the application starts.
# ================================================================

# ── Server ───────────────────────────────────────────────────────
# The port the embedded Tomcat server listens on.
# Frontend pages must call http://localhost:8080
server.port=8080

# ── H2 Database (Embedded / File-based) ──────────────────────────
# H2 is a lightweight Java database that runs inside the app.
# Using file mode (jdbc:h2:file:) so data persists across restarts.
# The DB files are stored in the ./data/ folder inside the project.
spring.datasource.url=jdbc:h2:file:./data/ddas_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=5999

# ── JPA / Hibernate ──────────────────────────────────────────────
# Dialect: tells Hibernate to generate H2-compatible SQL
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# ddl-auto=update: Hibernate auto-creates/updates tables on startup
# based on the @Entity classes (User, FileData). Safe for development.
spring.jpa.hibernate.ddl-auto=update

# show-sql=true: Prints every SQL query to the console (useful for debugging)
spring.jpa.show-sql=true

# ── H2 Web Console ───────────────────────────────────────────────
# Enables a browser-based database admin panel.
# Access at: http://localhost:8080/h2-console
# JDBC URL to enter in the console: jdbc:h2:file:./data/ddas_db
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── Application Identity ─────────────────────────────────────────
# Application name (used in logs and Spring Boot actuator if enabled)
spring.application.name=ddas-backend

# NOTE: Spring Security is now configured via SecurityConfig.java
# (com.ddas.backend.config.SecurityConfig) — not excluded here.
# That class properly sets up CORS, disables CSRF, permits all routes,
# and allows the H2 console iframe.